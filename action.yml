name: 'Auto Publish Blog'
description: 'Automatically publish Markdown blog posts to multiple platforms including Dev.to, Hashnode, and Medium. Supports cover images, SEO optimization, and content differentiation.'
author: 'Your Name'

inputs:
  posts-path:
    description: 'Path to directory containing Markdown posts (e.g., ./_posts)'
    required: false
    default: './_posts'
  devto-api-key:
    description: 'Dev.to API key for publishing'
    required: false
  devto-enabled:
    description: 'Enable Dev.to publishing'
    required: false
    default: 'true'
  content-mode:
    description: 'Content mode: full (100%) or summary (70% with link back)'
    required: false
    default: 'summary'
  blog-url:
    description: 'Your blog URL for backlinks in summary mode'
    required: false
    default: ''
  tags:
    description: 'Comma-separated default tags for all posts'
    required: false
    default: 'programming,technology'
  dry-run:
    description: 'Preview without actually publishing'
    required: false
    default: 'false'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'upload-cloud'
  color: 'blue'
