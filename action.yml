name: 'Auto Publish Blog'
description: "Auto-publish Markdown posts to Dev.to with SEO and duplicate detection"
author: 'Your Name'

inputs:
  posts-path:
    description: "Auto-publish Markdown posts to Dev.to with SEO and duplicate detection"
    required: false
    default: './_posts'
  devto-api-key:
    description: "Auto-publish Markdown posts to Dev.to with SEO and duplicate detection"
    required: false
  devto-enabled:
    description: "Auto-publish Markdown posts to Dev.to with SEO and duplicate detection"
    required: false
    default: 'true'
  content-mode:
    description: "Auto-publish Markdown posts to Dev.to with SEO and duplicate detection"
    required: false
    default: 'summary'
  blog-url:
    description: "Auto-publish Markdown posts to Dev.to with SEO and duplicate detection"
    required: false
    default: ''
  tags:
    description: "Auto-publish Markdown posts to Dev.to with SEO and duplicate detection"
    required: false
    default: 'programming,technology'
  dry-run:
    description: "Auto-publish Markdown posts to Dev.to with SEO and duplicate detection"
    required: false
    default: 'false'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'upload-cloud'
  color: 'blue'
